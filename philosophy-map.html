<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>哲学者カオスマップ / Philosopher Map</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:Georgia,"Hiragino Mincho ProN","Yu Mincho",serif;user-select:none;background:#0A0D14}
#app{position:relative;width:100vw;height:100vh;background:radial-gradient(ellipse at 50% 30%,#131826 0%,#0A0D14 65%)}
#graph{width:100%;height:100%;display:block;touch-action:none}

/* ── Title ── */
#title{position:absolute;top:14px;left:14px;pointer-events:none}
#title h1{color:#EDE7D6;font-size:17px;letter-spacing:.05em}
#title p{color:#8A8F9E;font-size:10.5px;margin-top:2px}

/* ── Controls ── */
#controls{position:absolute;top:14px;right:14px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;justify-content:flex-end}
.ctrl-pill{background:rgba(20,24,36,.88);border:1px solid #2A3142;border-radius:999px}
#search-wrap{display:flex;align-items:center;gap:7px;padding:6px 13px}
#search-input{background:transparent;border:none;outline:none;color:#EDE7D6;font-family:inherit;font-size:13px;width:148px}
#search-input::placeholder{color:#5C6173}
#clear-btn{background:none;border:none;cursor:pointer;color:#8A8F9E;font-size:13px;display:none;padding:0;line-height:1}
#zoom-wrap{display:flex;align-items:center;overflow:hidden}
.zbtn{background:none;border:none;cursor:pointer;color:#8A8F9E;padding:7px 10px;display:flex;align-items:center;transition:background .15s}
.zbtn:hover{background:rgba(255,255,255,.07)}
#zoom-pct{color:#8A8F9E;font-family:monospace;font-size:11px;min-width:40px;text-align:center;cursor:default}
.vd{width:1px;height:18px;background:#2A3142}
#reset-btn{background:rgba(20,24,36,.88);border:1px solid #2A3142;border-radius:999px;cursor:pointer;color:#8A8F9E;padding:7px 11px;display:flex;align-items:center;gap:5px;transition:all .15s;font-family:monospace;font-size:11px;letter-spacing:.04em;white-space:nowrap}
#reset-btn:hover{background:rgba(255,255,255,.07);color:#EDE7D6}
#lang-select{background:rgba(20,24,36,.88);border:1px solid #2A4A5A;border-radius:999px;cursor:pointer;color:#4FC3E8;padding:7px 26px 7px 12px;font-family:monospace;font-size:11px;letter-spacing:.04em;font-weight:bold;white-space:nowrap;outline:none;-webkit-appearance:none;appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='%234FC3E8' stroke-width='3'><path d='M6 9l6 6 6-6'/></svg>");background-repeat:no-repeat;background-position:right 10px center}
#lang-select:hover{color:#EDE7D6}
#lang-select option{background:#141824;color:#EDE7D6;font-weight:normal}

/* ── Legend ── */
#legend{position:absolute;bottom:14px;left:14px;background:rgba(20,24,36,.88);border:1px solid #2A3142;border-radius:12px;padding:11px;max-width:240px}
#leg-toggle{background:none;border:none;cursor:pointer;color:#EDE7D6;font-family:inherit;font-size:11px;font-weight:bold;display:flex;align-items:center;gap:4px;padding:0}
#era-list{display:flex;flex-direction:column;gap:4px;margin-top:6px}
.era-btn{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:8px;text-align:left;font-family:inherit;padding:0;transition:opacity .15s}
.era-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.era-lbl{color:#C9CCD6;font-size:10.5px}
#leg-hint{color:#5C6173;font-size:9px;margin-top:8px;line-height:1.65}
#leg-hint span{color:#3A405A}

/* ── Detail panel ── */
#detail{position:absolute;top:66px;right:14px;bottom:14px;width:284px;background:rgba(14,17,28,.97);border:1px solid #2A3142;border-radius:12px;padding:15px;overflow-y:auto;display:none}
#detail.open{display:block}
#d-close{float:right;background:none;border:none;cursor:pointer;color:#8A8F9E;font-size:16px;line-height:1;padding:0}
#d-era{font-size:10px;letter-spacing:.05em;margin-top:4px;clear:right}
#d-name{color:#EDE7D6;font-size:19px;font-weight:bold;margin-top:3px}
#d-meta{color:#8A8F9E;font-size:11px;margin-bottom:3px}
#d-summary{color:#C9CCD6;font-size:12px;line-height:1.75;margin-top:7px}
#d-rel-title{color:#8A8F9E;font-size:10px;margin-top:13px;margin-bottom:5px}
#d-rels{display:flex;flex-direction:column;gap:5px}
.rel-row{background:rgba(255,255,255,.03);border:1px solid #232838;border-radius:8px;padding:6px 10px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-family:inherit;text-align:left;transition:background .15s;width:100%}
.rel-row:hover{background:rgba(255,255,255,.07)}
.rel-name{color:#EDE7D6;font-size:12px}
.rel-type{font-size:9.5px}
.node-label{paint-order:stroke;stroke:#0A0D14;stroke-width:3px;fill:#EDE7D6;font-size:11px;pointer-events:none;font-family:Georgia,"Hiragino Mincho ProN","Yu Mincho",serif}

/* ── Mobile ── */
@media(max-width:640px){
  #title h1{font-size:14px}
  #title p{font-size:9.5px}
  #controls{top:10px;right:10px;gap:5px}
  #search-input{width:110px}
  #detail{
    position:fixed;top:auto;right:0;left:0;bottom:0;width:100%;
    max-height:58vh;border-radius:12px 12px 0 0;border-bottom:none
  }
  #legend{max-width:200px;padding:9px;bottom:10px;left:10px}
  .era-lbl{font-size:9.5px}
}
@media(max-width:400px){
  #search-wrap{padding:5px 10px}
  #search-input{width:90px;font-size:12px}
  #zoom-pct{min-width:34px;font-size:10px}
  .zbtn{padding:6px 8px}
}
</style>
</head>
<body>
<div id="app">
<svg id="graph"></svg>

<div id="title">
  <h1 id="t-title">哲学者カオスマップ</h1>
  <p id="t-stats"></p>
</div>

<div id="controls">
  <div class="ctrl-pill" id="search-wrap">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#8A8F9E" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="search-input" autocomplete="off"/>
    <button id="clear-btn">✕</button>
  </div>
  <div class="ctrl-pill" id="zoom-wrap">
    <button class="zbtn" id="btn-zo" title="-">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </button>
    <div class="vd"></div>
    <span id="zoom-pct">100%</span>
    <div class="vd"></div>
    <button class="zbtn" id="btn-zi" title="+">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </button>
  </div>
  <button id="reset-btn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#8A8F9E" stroke-width="2.2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
    <span id="t-reset">リセット</span>
  </button>
  <select id="lang-select" title="Language">
    <option value="en">English</option>
    <option value="ja">日本語</option>
    <option value="zh">中文</option>
    <option value="ko">한국어</option>
    <option value="es">Español</option>
    <option value="fr">Français</option>
    <option value="pt">Português</option>
  </select>
</div>

<div id="legend">
  <button id="leg-toggle">ℹ <span id="t-leg-title">時代区分</span></button>
  <div id="era-list"></div>
  <div id="leg-hint"><span id="t-leg-hint"></span></div>
</div>

<div id="detail">
  <button id="d-close">✕</button>
  <div id="d-era"></div>
  <div id="d-name"></div>
  <div id="d-meta"></div>
  <p id="d-summary"></p>
  <div id="d-rel-title"></div>
  <div id="d-rels"></div>
</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  UI STRINGS
// ═══════════════════════════════════════════════════════════
const S = {
  ja:{
    title:'哲学者カオスマップ',
    stats:(n,e)=>n+'名 / '+e+'本の関係線',
    searchPh:'哲学者を検索…',
    legTitle:'時代区分（クリックで絞り込み）',
    hint:'実線=師弟　点線=影響　破線（赤）=批判的対決\n円の大きさ＝関係の多さ\nズーム：ホイール/＋－キー/ボタン　0でリセット',
    reset:'リセット',
    relTitle:n=>'関係（'+n+'）',
    rt:{teacher_out:'師',teacher_in:'弟子',critique:'批判的対決',inf_out:'→影響',inf_in:'影響←'}
  },
  en:{
    title:'Philosopher Network Map',
    stats:(n,e)=>n+' philosophers / '+e+' connections',
    searchPh:'Search philosophers…',
    legTitle:'Era Filter (click to toggle)',
    hint:'Solid=Teacher/Student  Dotted=Influence  Dashed Red=Critical Engagement\nNode size = number of connections\nZoom: Scroll / ± keys / Buttons   Reset: 0',
    reset:'Reset',
    relTitle:n=>'Relations ('+n+')',
    rt:{teacher_out:'Teacher',teacher_in:'Student',critique:'Critical Engagement',inf_out:'→Influenced',inf_in:'Influenced by'}
  }
};

// ═══════════════════════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════════════════════
const ERAS=[
  {id:'ancient',           ja:'古代ギリシア',              en:'Ancient Greece',                        color:'#C9A227'},
  {id:'medieval',          ja:'中世',                    en:'Medieval',                               color:'#C97B3D'},
  {id:'rationalism_empiricism',ja:'近世 合理論・経験論',  en:'Early Modern: Rationalism & Empiricism',color:'#4FB3A6'},
  {id:'idealism',          ja:'ドイツ観念論',              en:'German Idealism',                        color:'#6E7FF3'},
  {id:'19c_rebels',        ja:'19世紀の反逆者たち',        en:'19th-Century Rebels',                   color:'#E0594A'},

  {id:'heraclitus',  name:'ヘラクレイトス',   en:'Heraclitus',       life:'前535–前475頃',era:'ancient',
   ja:'「万物は流転する」。対立と変化の中にロゴスを見た。',
   summary_en:'Famous for "everything flows." Saw logos—reason and order—in the constant interplay of opposites and change.'},
  {id:'parmenides',  name:'パルメニデス',      en:'Parmenides',       life:'前515–前450頃',era:'ancient',
   ja:'「有るものは有り、有らぬものは有らぬ」。変化を否定する存在一元論。',

  {id:'socrates',    name:'ソクラテス',        en:'Socrates',         life:'前470–前399',  era:'ancient',

  {id:'plato',       name:'プラトン',          en:'Plato',            life:'前427–前347',  era:'ancient',

  {id:'aristotle',   name:'アリストテレス',    en:'Aristotle',        life:'前384–前322',  era:'ancient',

  {id:'hume',        name:'ヒューム',            en:'Hume',             life:'1711–1776',    era:'rationalism_empiricism',

  {id:'fichte',      name:'フィヒテ',            en:'Fichte',           life:'1762–1814',    era:'idealism',

  {id:'schelling',   name:'シェリング',          en:'Schelling',        life:'1775–1854',    era:'idealism',

samento tornou-se o fundamento da teologia medieval."}}, "epicurus": {"zh": {"name": "伊壁鸠鲁", "s": "主张以心灵的宁静（ataraxia）为最高的善。提出原子论式的唯物论。影响了后世的享乐主义与唯物论。"}, "ko": {"name": "에피쿠로스", "s": "아타락시아(마음의 평정)를 최고의 선으로 주창했다. 원자론적 유물론을 전개했으며 후대의 쾌락주의와 유물론에 영향을 주었다."}, "es": {"name": "Epicuro", "s": "Defendió la ataraxia (tranquilidad) como el bien supremo. Desarrolló el materialismo atomista. Influyó en el hedonismo y el materialismo posteriores."}, "fr": {"name": "Épicure", "s": "Il prôna l'ataraxie (la tranquillité) comme souverain bien. Il développa un matérialisme atomiste. Il influença l'hédonisme et le matérialisme ultérieurs."}, "pt": {"name": "Epicuro", "s": "Defendeu a ataraxia (tranquilidade) como o bem supremo. Desenvolveu o materialismo atomista. Influenciou o hedonismo e o materialismo posteriores."}}, "zeno_stoic": {"zh": {"name": "季蒂昂的芝诺", "s": "斯多亚学派的创始人。主张遵循理性与德性而生活，便能不受境遇左右而获得幸福。"}, "ko": {"name": "제논(스토아 학파)", "s": "스토아 학파의 창시자. 이성과 덕에 따라 사는 것이 상황에 관계없이 행복을 가져온다고 가르쳤다."}, "es": {"name": "Zenón de Citio", "s": "Fundador del estoicismo. Enseñó que vivir conforme a la razón y la virtud trae la felicidad al margen de las circunstancias."}, "fr": {"name": "Zénon de Cition", "s": "Fondateur du stoïcisme. Il enseigna que vivre selon la raison et la vertu procure le bonheur, quelles que soient les circonstances."}, "pt": {"name": "Zenão de Cítio", "s": "Fundador do estoicismo. Ensinou que viver de acordo com a razão e a virtude traz felicidade, independentemente das circunstâncias."}}, "plotinus": {"zh": {"name": "普罗提诺", "s": "新柏拉图主义的奠基者。他关于万物由「太一」流溢而出的学说深刻影响了基督教神学与神秘主义。"}, "ko": {"name": "플로티노스", "s": "신플라톤주의의 창시자. \"일자\"로부터의 유출설은 기독교 신학과 신비주의에 깊은 영향을 주었다."}, "es": {"name": "Plotino", "s": "Fundador del neoplatonismo. Su teoría de la emanación desde \"el Uno\" influyó profundamente en la teología cristiana y el misticismo."}, "fr": {"name": "Plotin", "s": "Fondateur du néoplatonisme. Sa théorie de l'émanation à partir de « l'Un » influença profondément la théologie ch ó a Aristóteles con la teología cristiana en la Suma teológica. La culminación de la filosofía escolástica."}, "fr": {"name": "Thomas d'Aquin", "s": "Il synthétisa Aristote et la théologie chrétienne dans la Somme théologique. Le sommet de la philosophie scolastique."}, "pt": {"name": "Tomás de Aquino", "s": "Sintetizou Aristóteles com a teologia cristã na Suma Teológica. O ápice da filosofia escolástica."}}, "scotus": {"zh": {"name": "邓斯·司各脱", "s": "批判托马斯主义，提出「这一性」（haecceitas）作为个体化原理。发展出精微细致的实在论形而上学。"}, "ko": {"name": "둔스 스코투스", "s": "토마스주의를 비판하고 개체화 원리로서 개별성(haecceitas)을 도입했다. 정교하고 세련된 실재론적 형이상학을 전개했다."}, "es": {"name": "Duns Escoto", "s": "Criticó el tomismo e introdujo la haecceidad (esta cosidad) como principio de individuación. Desarrolló una metafísica realista sutil y refinada."}, "fr": {"name": "Duns Scot", "s": "Il critiqua le thomisme et introduisit l'heccéité (l'être-ceci) comme principe d'individuation. Il développa une métaphysique réaliste subtile et raffinée."}, "pt": {"name": "Duns Escoto", "s": "Criticou o tomismo e introduziu a heceidade (isto-idade) como princípio de individuação. Desenvolveu uma metafísica realista sutil e refinada."}}, "ockham": {"zh": {"name": "奥卡姆的威廉", "s": "唯名论思想家。「奥卡姆剃刀」主张削除不必要的实体。彻底地将信仰与理性分离。"}, "ko": {"name": "오컴의 윌리엄", "s": "유명론 사상가. \"오컴의 면도날\"은 불필요한 실체를 제거할 것을 촉구한다. 신앙과 이성을 근본적으로 분리했다."}, "es": {"name": "Guillermo de Ockham", "s": "Pensador nominalista. La \"navaja de Ockham\" insta a eliminar las entidades innecesarias. Separó radicalmente la fe de la razón."}, "fr": {"name": "Guillaume d'Ockham", "s": "Penseur nominaliste. Le « rasoir d'Ockham » invite à éliminer les entités superflues. Il sépara radicalement la foi de la raison."}, "pt": {"name": "Guilherme de Ockham", "s": "Pensador nominalista. A \"Navalha de Ockham\" recomenda eliminar entidades desnecessárias. Separou radicalmente a fé da razão."}}, "descartes": {"zh": {"name": "笛卡尔", "s": "「我思故我在。」通过方法论的怀疑奠定了近代哲学；确立了心物二元论。"}, "ko": {"name": "데카르트", "s": "\"나는 생각한다, 고로 나는 존재한다.\" 방법적 회의를 통해 근대 철학을 창시했으며 심신 이원론을 확립했다."}, "es": {"name": "Descartes", "s": "\"Pienso, luego existo.\" Fundó la filosofía moderna mediante la duda metódica; estableció el dualismo mente-cuerpo."}, "fr": {"name": "Descartes", "s": "« Je pense, donc je suis. » Il fonda la philosophie moderne par le doute méthodique ; il établit le dualisme de l'âme et du corps."}, "pt": {"name": "Descartes", "s": "\"Penso, logo existo.\" Fundou a filosofia moderna por meio da dúvida metódica; estabeleceu o dualismo mente-corpo."}}, "pascal": {"zh": {"name": "帕斯卡", "s": "「人是会思考的芦苇。」将几何学精神与敏感性精神相对照。是存在主义思想的先驱。"}, "ko": {"name": "파스칼", "s": "\"인간은 생각하는 갈대이다.\" 기하학적 정신과 섬세한 정신을 대비시켰다. 실존적 사유의 선구자이다."}, "es": {"name": "Pascal", "s": "\"El hombre es una caña pensante.\" Contrastó el espíritu geométrico con el espíritu de fineza. Precursor del pensamiento existencial."}, "fr": {"name": "Pascal", "s": "« L'homme est un roseau pensant. » Il opposa l'esprit de géométrie à l'esprit de finesse. Un précurseur de la pensée existentielle."}, "pt": {"name": "Pascal", "s": "\"O homem é um caniço pensante.\" Contrastou o espírito geométrico com o espírito de finura. Precursor do pensamento existencial."}}, "hobbes": {"zh": {"name": "霍布斯", "s": "《利维坦》主张，为了摆脱自然状态下「一切人对一切人的战争」，需要社会契约。"}, "ko": {"name": "홉스", "s": "『리바이어던』은 야만적인 자연 상태의 \"만인의 만인에 대한 투쟁\"에서 벗어나기 위해 사회 계약이 필요하다고 주장한다."}, "es": {"name": "Hobbes", "s": "El Leviatán sostiene que el contrato social es necesario para escapar de la \"guerra de todos contra todos\" del brutal estado de naturaleza."}, "fr": {"name": "Hobbes", "s": "Le Léviathan soutient que le contrat social est nécessaire pour échapper à la « guerre de tous contre tous » dans l'état de nature brutal."}, "pt": {"name": "Hobbes", "s": "O Leviatã argumenta que o contrato social é necessário para escapar da \"guerra de todos contra todos\" no estado bruto de natureza."}}, "spinoza": {"zh": {"name": "斯宾诺莎", "s": "神即自然（泛神论式的一元论）。以几何学方法论证伦理学。深刻影响了德国观念论。"}, "ko": {"name": "스피노자", "s": "신 즉 자연(범신론적 일원론). 기하학적 방법으로 윤리학을 논증했다. 독일 관념론에 깊은 영향을 주었다."}, "es": {"name": "Spinoza", "s": "Dios = Naturaleza (monismo panteísta). Demostró la ética mediante el método geométrico. Influyó profundamente en el idealismo alemán."}, "fr": {"name": "Spinoza", "s": "Dieu = Nature (monisme panthéiste). Il démontra l'éthique par la méthode géométrique. Il influença profondément l'idéalisme allemand."}, "pt": {"name": "Espinosa", "s": "Deus = Natureza (monismo panteísta). Demonstrou a ética pelo método geométrico. Influenciou profundamente o Idealismo Alemão."}}, "leibniz": {"zh": {"name": "莱布尼茨", "s": "单子论。主张在上帝的预定和谐下，我们生活在「一切可能世界中最好的世界」。微积分的共同发明者。"}, "ko": {"name": "라이프니츠", "s": "모나드론. 신의 예정 조화를 통해 우리가 \"가능한 모든 세계 중 최선의 세계\"에 산다고 주장했다. 미적분의 공동 창시자이다."}, "es": {"name": "Leibniz", "s": "Monadología. Sostuvo que vivimos en \"el mejor de los mundos posibles\" gracias a la armonía preestablecida por Dios. Coinventor del cálculo."}, "fr": {"name": "Leibniz", "s": "La Monadologie. Il soutint que nous vivons dans « le meilleur des mondes possibles » grâce à l'harmonie préétablie de Dieu. Coinventeur du calcul infinitésimal."}, "pt": {"name": "Leibniz", "s": "Monadologia. Argumentou que vivemos no \"melhor dos mundos possíveis\" pela harmonia preestabelecida por Deus. Co-inventor do cálculo."}}, "locke": {"zh": {"name": "洛克", "s": "心灵如同白板（tabula rasa）。经验主义与自由主义之父；其财产权理论影响了立宪主义。"}, "ko": {"name": "로크", "s": "마음은 백지(타불라 라사)이다. 경험론과 자유주의의 아버지로, 그의 소유권 이론은 입헌주의에 영향을 주었다."}, "es": {"name": "Locke", "s": "La mente como tabla rasa. Padre del empirismo y el liberalismo; su teoría de los derechos de propiedad influyó en el constitucionalismo."}, "fr": {"name": "Locke", "s": "L'esprit comme page blanche (tabula rasa). Père de l'empirisme et du libéralisme ; sa théorie du droit de propriété influença le constitutionnalisme."}, "pt": {"name": "Locke", "s": "A mente como uma folha em branco (tabula rasa). Pai do empirismo e do liberalismo; sua teoria dos direitos de propriedade influenciou o constitucionalismo."}}, "berkeley": {"zh": {"name": "贝克莱", "s": "「存在即被感知。」否认物质的存在，认为只有心灵及其观念存在——主观观念论。"}, "ko": {"name": "버클리", "s": "\"존재하는 것은 지각되는 것이다.\" 물질의 존재를 부정하고 오직 정신과 그 관념만이 존재한다는 주관적 관념론을 폈다."}, "es": {"name": "Berkeley", "s": "\"Ser es ser percibido.\" Negó la existencia de la materia; sólo existen las mentes y sus ideas: idealismo subjetivo."}, "fr": {"name": "Berkeley", "s": "« Être, c'est être perçu. » Il nia l'existence de la matière ; seuls les esprits et leurs idées existent — idéalisme subjectif."}, "pt": {"name": "Berkeley", "s": "\"Ser é ser percebido.\" Negou a existência da matéria; só existem mentes e suas ideias — idealismo subjetivo."}}, "hume": {"zh": {"name": "休谟", "s": "彻底的怀疑论者，主张因果关系不过是习惯。他对理性主义的挑战将康德从「独断的迷梦」中唤醒。"}, "ko": {"name": "흄", "s": "인과율이 단지 습관에 불과하다고 주장한 급진적 회의론자. 합리론에 대한 그의 도전은 칸트를 \"독단의 잠\"에서 깨웠다."}, "es": {"name": "Hume", "s": "Escéptico radical que sostuvo que la causalidad es mero hábito. Su desafío al racionalismo despertó a Kant de su \"sueño dogmático\"."}, "fr": {"name": "Hume", "s": "Sceptique radical qui soutint que la causalité n'est qu'une habitude. Son défi au rationalisme tira Kant de son « sommeil dogmatique »."}, "pt": {"name": "Hume", "s": "Cético radical que argumentava que a causalidade é mero hábito. Seu desafio ao racionalismo despertou Kant de seu \"sono dogmático\"."}}, "rousseau": {"zh": {"name": "卢梭", "s": "公意与人民主权论。「回归自然。」其思想成为法国大革命背后一股主要的思想力量。"}, "ko": {"name": "루소", "s": "일반 의지와 인민 주권론. \"자연으로 돌아가라.\" 그의 사상은 프랑스 혁명의 주요한 지적 원동력이 되었다."}, "es": {"name": "Rousseau", "s": "Voluntad general y soberanía popular. \"Volver a la naturaleza.\" Sus ideas fueron una gran fuerza intelectual tras la Revolución francesa."}, "fr": {"name": "Rousseau", "s": "Volonté générale et souveraineté populaire. « Retour à la nature. » Ses idées furent une force intellectuelle majeure derrière la Révolution française."}, "pt": {"name": "Rousseau", "s": "Vontade geral e soberania popular. \"De volta à natureza.\" Suas ideias tornaram-se grande força intelectual por trás da Revolução Francesa."}}, "kant": {"zh": {"name": "康德", "s": "哲学中的「哥白尼式革命」：心灵能动地塑造经验。三大批判的作者。近代哲学的伟大转折点。"}, "ko": {"name": "칸트", "s": "철학의 \"코페르니쿠스적 전환\": 정신이 능동적으로 경험을 형성한다. 세 비판서의 저자. 근대 철학의 위대한 전환점이다."}, "es": {"name": "Kant", "s": "\"Revolución copernicana\" en filosofía: la mente moldea activamente la experiencia. Autor de las tres Críticas. El gran punto de inflexión de la filosofía moderna."}, "fr": {"name": "Kant", "s": "La « révolution copernicienne » en philosophie : l'esprit façonne activement l'expérience. Auteur des trois Critiques. Le grand tournant de la philosophie moderne."}, "pt": {"name": "Kant", "s": "\"Revolução copernicana\" na filosofia: a mente molda ativamente a experiência. Autor das três Críticas. O grande ponto de virada da filosofia moderna."}}, "fichte": {"zh": {"name": "费希特", "s": "将康德的实践哲学彻底化：自我（Ich）设定自身，也设定世界。发展出主观观念论。"}, "ko": {"name": "피히테", "s": "칸트의 실천 철학을 급진화하여 자아(Ich)가 자기 자신과 세계를 모두 정립한다고 보았다. 주관적 관념론을 전개했다."}, "es": {"name": "Fichte", "s": "Radicalizó la filosofía práctica de Kant: el yo (Ich) pone tanto a sí mismo como al mundo. Desarrolló el idealismo subjetivo."}, "fr": {"name": "Fichte", "s": "Il radicalisa la philosophie pratique de Kant : le moi (Ich) se pose lui-même et pose le monde. Il développa un idéalisme subjectif."}, "pt": {"name": "Fichte", "s": "Radicalizou a filosofia prática de Kant: o eu (Ich) põe a si mesmo e ao mundo. Desenvolveu o idealismo subjetivo."}}, "schelling": {"zh": {"name": "谢林", "s": "自然哲学与同一哲学。曾是黑格尔的盟友，后成论敌。其晚期思想预示了存在主义的关切。"}, "ko": {"name": "셸링", "s": "자연철학과 동일철학. 헤겔의 협력자에서 논적이 되었다. 후기 저작은 실존적 관심을 예고했다."}, "es": {"name": "Schelling", "s": "Filosofía de la naturaleza y filosofía de la identidad. Colaborador de Hegel convertido en rival. Su obra tardía anticipó preocupaciones existenciales."}, "fr": {"name": "Schelling", "s": "Philosophie de la nature et philosophie de l'identité. Collaborateur de Hegel devenu rival. Son œuvre tardive annonça des préoccupations existentielles."}, "pt": {"name": "Schelling", "s": "Filosofia da natureza e filosofia da identidade. Colaborador de Hegel tornado rival. Sua obra tardia prenunciou preocupações existenciais."}}, "hegel": {"zh": {"name": "黑格尔", "s": "辩证法（正—反—合）是绝对精神在历史中的自我展开。19世纪的伟大枢纽，反叛者们皆借由与之对立来界定自身。"}, "ko": {"name": "헤겔", "s": "변증법(정-반-합)을 역사를 통한 절대정신의 자기 전개로 보았다. 반역자들이 스스로를 규정한 19세기의 위대한 중심축이다."}, "es": {"name": "Hegel", "s": "La dialéctica (tesis-antítesis-síntesis) como el autodespliegue del Espíritu Absoluto a través de la historia. El gran eje del siglo XIX en torno al cual se definieron los rebeldes."}, "fr": {"name": "Hegel", "s": "La dialectique (thèse-antithèse-synthèse) comme auto-déploiement de l'Esprit absolu à travers l'histoire. Le grand pivot du XIXe siècle contre lequel les rebelles se définirent."}, "pt": {"name": "Hegel", "s": "Dialética (tese-antítese-síntese) como o autodesdobramento do Espírito Absoluto através da história. O grande eixo do século XIX em torno do qual os rebeldes se definiram."}}, "schopenhauer": {"zh": {"name": "叔本华", "s": "世界作为盲目的「意志」与表象。厌恶黑格尔的悲观主义者。汲取佛教思想，并深刻影响了尼采。"}, "ko": {"name": "쇼펜하우어", "s": "세계를 맹목적인 의지와 표상으로 보았다. 헤겔을 경멸한 염세주의자. 불교에서 착안했으며 니체에게 깊은 영향을 주었다."}, "es": {"name": "Schopenhauer", "s": "El mundo como Voluntad ciega y Representación. Pesimista que despreciaba a Hegel. Se nutrió del budismo e influyó profundamente en Nietzsche."}, "fr": {"name": "Schopenhauer", "s": "Le monde comme Volonté aveugle et Représentation. Pessimiste qui méprisait Hegel. Il puisa dans le bouddhisme et influença profondément Nietzsche."}, "pt": {"name": "Schopenhauer", "s": "O mundo como Vontade cega e Representação. Pessimista que desprezava Hegel. Inspirou-se no budismo e influenciou profundamente Nietzsche."}}, "kierkegaard": {"zh": {"name": "克尔凯郭尔", "s": "反对黑格尔的体系：个体经历审美、伦理与宗教三阶段。存在主义之父。"}, "ko": {"name": "키르케고르", "s": "헤겔의 체계에 맞서, 개인은 심미적·윤리적·종교적 단계를 거친다고 보았다. 실존주의의 아버지이다."}, "es": {"name": "Kierkegaard", "s": "Contra el sistema de Hegel: el individuo atraviesa los estadios estético, ético y religioso. Padre del existencialismo."}, "fr": {"name": "Kierkegaard", "s": "Contre le système de Hegel : l'individu progresse à travers les stades esthétique, éthique et religieux. Père de l'existentialisme."}, "pt": {"name": "Kierkegaard", "s": "Contra o sistema de Hegel: o indivíduo passa pelos estágios estético, ético e religioso. Pai do existencialismo."}}, "marx": {"zh": {"name": "马克思", "s": "将黑格尔的辩证法颠倒为历史唯物主义。异化、阶级斗争与意识形态的理论塑造了现代政治思想。"}, "ko": {"name": "마르크스", "s": "헤겔의 변증법을 유물론적으로 전도시켰다. 소외론, 계급투쟁, 이데올로기 이론은 근대 정치사상을 형성했다."}, "es": {"name": "Marx", "s": "Invirtió la dialéctica de Hegel en materialismo histórico. Sus teorías de la alienación, la lucha de clases y la ideología moldearon el pensamiento político moderno."}, "fr": {"name": "Marx", "s": "Il renversa la dialectique de Hegel en matérialisme historique. Ses théories de l'aliénation, de la lutte des classes et de l'idéologie façonnèrent la pensée politique moderne."}, "pt": {"name": "Marx", "s": "Inverteu a dialética de Hegel em materialismo histórico. As teorias da alienação, luta de classes e ideologia moldaram o pensamento político moderno."}}, "nietzsche": {"zh": {"name": "尼采", "s": "「上帝已死。」道德谱系学、权力意志、超人、永恒轮回。是横跨各大陆的20世纪思想的催化剂。"}, "ko": {"name": "니체", "s": "\"신은 죽었다.\" 도덕의 계보학, 힘에의 의지, 초인, 영원회귀. 여러 대륙에 걸쳐 20세기 사상의 기폭제가 되었다."}, "es": {"name": "Nietzsche", "s": "\"Dios ha muerto.\" Genealogía de la moral, voluntad de poder, superhombre, eterno retorno. Detonante del pensamiento del siglo XX en todos los continentes."}, "fr": {"name": "Nietzsche", "s": "« Dieu est mort. » Généalogie de la morale, volonté de puissance, surhomme, éternel retour. Catalyseur de la pensée du XXe siècle sur tous les continents."}, "pt": {"name": "Nietzsche", "s": "\"Deus está morto.\" Genealogia da moral, vontade de poder, Übermensch, eterno retorno. Catalisador do pensamento do século XX em vários continentes."}}, "mill": {"zh": {"name": "约翰·斯图亚特·密尔", "s": "在质的层面上精炼了功利主义。《论自由》捍卫个人自由，仅以伤害原则为界限。"}, "ko": {"name": "존 스튜어트 밀", "s": "공리주의를 질적으로 정교화했다. 『자유론』은 위해 원칙에 의해서만 제한되는 개인의 자유를 옹호했다."}, "es": {"name": "John Stuart Mill", "s": "Refinó cualitativamente el utilitarismo. Sobre la libertad defendió la libertad individual limitada sólo por el principio del daño."}, "fr": {"name": "John Stuart Mill", "s": "Il raffina qualitativement l'utilitarisme. De la liberté défendit la liberté individuelle limitée seulement par le principe de non-nuisance."}, "pt": {"name": "John Stuart Mill", "s": "Refinou qualitativamente o utilitarismo. Em Sobre a Liberdade, defendeu a liberdade individual limitada apenas pelo princípio do dano."}}, "comte": {"zh": {"name": "孔德", "s": "实证主义与社会学的创始人。知识发展的三阶段：神学的→形而上学的→实证的（科学的）。"}, "ko": {"name": "콩트", "s": "실증주의와 사회학의 창시자. 지식의 세 단계, 즉 신학적 → 형이상학적 → 실증적(과학적) 단계를 제시했다."}, "es": {"name": "Comte", "s": "Fundador del positivismo y de la sociología. Los tres estados del conocimiento: teológico → metafísico → positivo (científico)."}, "fr": {"name": "Comte", "s": "Fondateur du positivisme et de la sociologie. Les trois états du savoir : théologique → métaphysique → positif (scientifique)."}, "pt": {"name": "Comte", "s": "Fundador do positivismo e da sociologia. Três estados do conhecimento: teológico → metafísico → positivo (científico)."}}, "freud": {"zh": {"name": "弗洛伊德", "s": "创立精神分析。无意识、本我／自我／超我。彻底改变了20世纪对心灵、文化与人性的理解。"}, "ko": {"name": "프로이트", "s": "정신분석을 창시했다. 무의식, 이드/자아/초자아. 정신, 문화, 인간 본성에 대한 20세기의 이해를 변혁시켰다."}, "es": {"name": "Freud", "s": "Fundó el psicoanálisis. El inconsciente, el ello/yo/superyó. Transformó la comprensión de la mente, la cultura y la naturaleza humana en el siglo XX."}, "fr": {"name": "Freud", "s": "Il fonda la psychanalyse. L'inconscient, le ça/moi/surmoi. Il transforma la compréhension de l'esprit, de la culture et de la nature humaine au XXe siècle."}, "pt": {"name": "Freud", "s": "Fundou a psicanálise. O inconsciente, id/ego/superego. Transformou a compreensão da mente, da cultura e da natureza humana no século XX."}}, "peirce": {"zh": {"name": "皮尔士", "s": "实用主义的创始人。发展出符号学与溯因推理（假说形成）的理论。"}, "ko": {"name": "퍼스", "s": "실용주의의 창시자. 기호학과 가설 형성(가추법)의 이론을 발전시켰다."}, "es": {"name": "Peirce", "s": "Fundador del pragmatismo. Desarrolló la semiótica y la teoría de la inferencia abductiva (formación de hipótesis)."}, "fr": {"name": "Peirce", "s": "Fondateur du pragmatisme. Il développa la sémiotique et la théorie de l'inférence abductive (formation d'hypothèses)."}, "pt": {"name": "Peirce", "s": "Fundador do pragmatismo. Desenvolveu a semiótica e a teoria da inferência abdutiva (formação de hipóteses)."}}, "james": {"zh": {"name": "威廉·詹姆斯", "s": "「彻底经验主义。」以实际效果来界定真理；使实用主义成为美国哲学的主流运动。"}, "ko": {"name": "윌리엄 제임스", "s": "\"근본적 경험론.\" 진리를 실용적 결과로 정의했으며 실용주의를 미국 철학의 지배적 사조로 만들었다."}, "es": {"name": "William James", "s": "\"Empirismo radical.\" Definió la verdad por sus consecuencias prácticas; convirtió el pragmatismo en un movimiento dominante de la filosofía estadounidense."}, "fr": {"name": "William James", "s": "« Empirisme radical. » Il définit la vérité par ses conséquences pratiques ; il fit du pragmatisme un mouvement dominant de la philosophie américaine."}, "pt": {"name": "William James", "s": "\"Empirismo radical.\" Definiu a verdade por suas consequências práticas; tornou o pragmatismo um movimento dominante na filosofia americana."}}, "dewey": {"zh": {"name": "杜威", "s": "工具主义。其教育哲学（做中学）与民主理论塑造了美国的思想与公民生活。"}, "ko": {"name": "듀이", "s": "도구주의. 그의 교육 철학(행함으로 배우기)과 민주주의 이론은 미국의 지적·시민적 삶을 형성했다."}, "es": {"name": "Dewey", "s": "Instrumentalismo. Su filosofía de la educación (aprender haciendo) y su teoría democrática moldearon la vida intelectual y cívica estadounidense."}, "fr": {"name": "Dewey", "s": "L'instrumentalisme. Sa philosophie de l'éducation (apprendre en faisant) et sa théorie démocratique façonnèrent la vie intellectuelle et civique américaine."}, "pt": {"name": "Dewey", "s": "Instrumentalismo. Sua filosofia da educação (aprender fazendo) e sua teoria democrática moldaram a vida intelectual e cívica americana."}}, "husserl": {"zh": {"name": "胡塞尔", "s": "「回到事物本身。」确立了现象学还原，以严格地描述意识的意向性。"}, "ko": {"name": "후설", "s": "\"사태 자체로.\" 지향적 의식을 엄밀히 기술하기 위해 현상학적 환원을 확립했다."}, "es": {"name": "Husserl", "s": "\"A las cosas mismas.\" Estableció la reducción fenomenológica para describir con rigor la conciencia intencional."}, "fr": {"name": "Husserl", "s": "« Retour aux choses mêmes. » Il établit la réduction phénoménologique pour décrire rigoureusement la conscience intentionnelle."}, "pt": {"name": "Husserl", "s": "\"De volta às coisas mesmas.\" Estabeleceu a redução fenomenológica para descrever rigorosamente a consciência intencional."}}, "heidegger": {"zh": {"name": "海德格尔", "s": "《存在与时间》。通过对此在（Dasein）的存在论分析追问存在本身的意义。20世纪思想的核心枢纽。"}, "ko": {"name": "하이데거", "s": "『존재와 시간』. 존재 자체의 의미를 추구하며 현존재(다자인)에 대한 실존론적 분석을 펼쳤다. 20세기 사상의 중심 허브이다."}, "es": {"name": "Heidegger", "s": "Ser y tiempo. Análisis existencial del Dasein en busca del sentido del Ser mismo. El eje central del pensamiento del siglo XX."}, "fr": {"name": "Heidegger", "s": "Être et Temps. Analyse existentielle du Dasein en quête du sens de l'Être lui-même. Le pivot central de la pensée du XXe siècle."}, "pt": {"name": "Heidegger", "s": "Ser e Tempo. Análise existencial do Dasein em busca do sentido do próprio Ser. O eixo central do pensamento do século XX."}}, "jaspers": {"zh": {"name": "雅斯贝尔斯", "s": "关于「临界处境」（死亡、斗争、罪责）的存在哲学。他是一位探讨超越的执业精神科医生。"}, "ko": {"name": "야스퍼스", "s": "\"한계상황\"(죽음, 투쟁, 죄)의 실존 철학. 초월을 탐구한 현역 정신과 의사이기도 했다."}, "es": {"name": "Jaspers", "s": "Filosofía existencial de las \"situaciones límite\" (muerte, lucha, culpa). Psiquiatra en ejercicio que exploró la trascendencia."}, "fr": {"name": "Jaspers", "s": "Philosophie existentielle des « situations-limites » (mort, lutte, culpabilité). Un psychiatre praticien qui explora la transcendance."}, "pt": {"name": "Jaspers", "s": "Filosofia existencial das \"situações-limite\" (morte, luta, culpa). Psiquiatra em exercício que explorou a transcendência."}}, "sartre": {"zh": {"name": "萨特", "s": "「存在先于本质。」自为存在与自在存在。倡导政治参与（介入）作为存在主义的责任。"}, "ko": {"name": "사르트르", "s": "\"실존은 본질에 앞선다.\" 대자 존재와 즉자 존재. 실존주의적 책임으로서 정치 참여(앙가주망)를 주창했다."}, "es": {"name": "Sartre", "s": "\"La existencia precede a la esencia.\" El ser-para-sí frente al en-sí. Defendió el compromiso político (engagement) como responsabilidad existencialista."}, "fr": {"name": "Sartre", "s": "« L'existence précède l'essence. » L'être-pour-soi contre l'en-soi. Il prôna l'engagement politique comme responsabilité existentialiste."}, "pt": {"name": "Sartre", "s": "\"A existência precede a essência.\" Ser-para-si versus em-si. Defendeu o engajamento político como responsabilidade existencialista."}}, "beauvoir": {"zh": {"name": "波伏娃", "s": "「女人不是天生的，而是后天形成的。」《第二性》是女性主义哲学的奠基之作。"}, "ko": {"name": "보부아르", "s": "\"여성은 태어나는 것이 아니라 만들어지는 것이다.\" 『제2의 성』은 페미니즘 철학의 기초 텍스트이다."}, "es": {"name": "Simone de Beauvoir", "s": "\"No se nace mujer: se llega a serlo.\" El segundo sexo es el texto fundacional de la filosofía feminista."}, "fr": {"name": "Beauvoir", "s": "« On ne naît pas femme, on le devient. » Le Deuxième Sexe est le texte fondateur de la philosophie féministe."}, "pt": {"name": "Beauvoir", "s": "\"Não se nasce mulher, torna-se mulher.\" O Segundo Sexo é o texto fundador da filosofia feminista."}}, "merleau_ponty": {"zh": {"name": "梅洛-庞蒂", "s": "身体的现象学：身体是经验的原初场所，先于主客体的分裂。对生成认知论有关键影响。"}, "ko": {"name": "메를로퐁티", "s": "신체의 현상학: 신체는 주체/객체 분리에 앞선 경험의 근원적 장소이다. 행위주의(enactivism)에 큰 영향을 주었다."}, "es": {"name": "Merleau-Ponty", "s": "Fenomenología del cuerpo: el cuerpo es el lugar primordial de la experiencia, previo a la escisión sujeto/objeto. Influencia clave en el enactivismo."}, "fr": {"name": "Merleau-Ponty", "s": "Phénoménologie du corps : le corps est le lieu primordial de l'expérience, antérieur à la scission sujet/objet. Influence clé sur l'énactivisme."}, "pt": {"name": "Merleau-Ponty", "s": "Fenomenologia do corpo: o corpo é o lugar primordial da experiência, anterior à cisão sujeito/objeto. Influência central no enativismo."}}, "camus": {"zh": {"name": "加缪", "s": "荒诞哲学。《西西弗神话》《反抗者》。因反抗与政治暴力的伦理问题而与萨特决裂。"}, "ko": {"name": "카뮈", "s": "부조리의 철학. 『시지프 신화』, 『반항하는 인간』. 반항의 윤리와 정치적 폭력을 둘러싸고 사르트르와 결별했다."}, "es": {"name": "Camus", "s": "Filosofía del absurdo. El mito de Sísifo. El hombre rebelde. Rompió con Sartre por la ética de la rebelión y la violencia política."}, "fr": {"name": "Camus", "s": "Philosophie de l'absurde. Le Mythe de Sisyphe. L'Homme révolté. Il rompit avec Sartre sur l'éthique de la révolte et la violence politique."}, "pt": {"name": "Camus", "s": "Filosofia do absurdo. O Mito de Sísifo. O Homem Revoltado. Rompeu com Sartre sobre a ética da revolta e a violência política."}}, "levinas": {"zh": {"name": "列维纳斯", "s": "「他者的面容」召唤出无限的伦理责任。将伦理学——而非存在论——置为第一哲学。"}, "ko": {"name": "레비나스", "s": "\"타자의 얼굴\"은 무한한 윤리적 책임을 불러낸다. 존재론이 아닌 윤리를 제일철학으로 삼았다."}, "es": {"name": "Levinas", "s": "\"El rostro del Otro\" convoca una responsabilidad ética infinita. Situó la ética —no la ontología— como filosofía primera."}, "fr": {"name": "Levinas", "s": "« Le visage d'Autrui » appelle à une responsabilité éthique infinie. Il plaça l'éthique — et non l'ontologie — comme philosophie première."}, "pt": {"name": "Levinas", "s": "\"O rosto do Outro\" convoca à responsabilidade ética infinita. Colocou a ética — não a ontologia — como filosofia primeira."}}, "arendt": {"zh": {"name": "阿伦特", "s": "对极权主义的批判。区分劳动、工作与行动。发展出一种关于公共领域的政治哲学。"}, "ko": {"name": "아렌트", "s": "전체주의 비판. 노동, 작업, 행위의 구분. 공공 영역의 정치철학을 전개했다."}, "es": {"name": "Arendt", "s": "Crítica del totalitarismo. Distinciones entre labor, trabajo y acción. Desarrolló una filosofía política de la esfera pública."}, "fr": {"name": "Arendt", "s": "Critique du totalitarisme. Distinctions entre le travail, l'œuvre et l'action. Elle développa une philosophie politique de l'espace public."}, "pt": {"name": "Arendt", "s": "Crítica do totalitarismo. Distinções entre labor, trabalho e ação. Desenvolveu uma filosofia política da esfera pública."}}, "dilthey": {"zh": {"name": "狄尔泰", "s": "「生命哲学。」将自然科学与精神科学（人文学科）加以方法上的区分；为诠释学奠定了基础。"}, "ko": {"name": "딜타이", "s": "\"생의 철학.\" 자연과학과 정신과학(인문학)을 구별하여 해석학의 토대를 마련했다."}, "es": {"name": "Dilthey", "s": "\"Filosofía de la vida.\" Distinguió las ciencias naturales de las ciencias del espíritu (Geisteswissenschaften); preparó el terreno para la hermenéutica."}, "fr": {"name": "Dilthey", "s": "« Philosophie de la vie. » Il distingua les sciences de la nature des sciences de l'esprit (Geisteswissenschaften) ; il prépara le terrain de l'herméneutique."}, "pt": {"name": "Dilthey", "s": "\"Filosofia da vida.\" Distinguiu as ciências naturais das ciências humanas (Geisteswissenschaften); preparou o terreno para a hermenêutica."}}, "benjamin": {"zh": {"name": "本雅明", "s": "机械复制时代艺术的「灵光」及其消逝。寓言与历史的天使。法兰克福学派边缘的悲剧性天才。"}, "ko": {"name": "벤야민", "s": "기계 복제 시대의 \"아우라\"와 그 소멸. 알레고리와 역사의 천사. 프랑크푸르트 학파 주변의 비극적 천재이다."}, "es": {"name": "Benjamin", "s": "El \"aura\" y su pérdida en la era de la reproducción mecánica. La alegoría y el Ángel de la Historia. Un genio trágico en los márgenes de la Escuela de Fráncfort."}, "fr": {"name": "Benjamin", "s": "L'« aura » et sa disparition à l'ère de la reproduction mécanisée. L'allégorie et l'Ange de l'histoire. Un génie tragique aux marges de l'École de Francfort."}, "pt": {"name": "Benjamin", "s": "A \"aura\" e sua perda na era da reprodução mecânica. Alegoria e o Anjo da História. Um gênio trágico à margem da Escola de Frankfurt."}}, "horkheimer": {"zh": {"name": "霍克海默", "s": "法兰克福研究所所长。批判理论的确立者。与阿多诺合著《启蒙辩证法》。"}, "ko": {"name": "호르크하이머", "s": "프랑크푸르트 연구소 소장. 비판 이론을 확립했다. 아도르노와 함께 『계몽의 변증법』을 공동 저술했다."}, "es": {"name": "Horkheimer", "s": "Director del Instituto de Fráncfort. Estableció la Teoría Crítica. Coautor de Dialéctica de la Ilustración junto a Adorno."}, "fr": {"name": "Horkheimer", "s": "Directeur de l'Institut de Francfort. Il établit la théorie critique. Coauteur de La Dialectique de la raison avec Adorno."}, "pt": {"name": "Horkheimer", "s": "Diretor do Instituto de Frankfurt. Estabeleceu a Teoria Crítica. Coautor da Dialética do Esclarecimento com Adorno."}}, "adorno": {"zh": {"name": "阿多诺", "s": "否定辩证法。对文化工业的批判。追问在奥斯维辛之后诗与哲学还能意味着什么。"}, "ko": {"name": "아도르노", "s": "부정 변증법. 문화 산업 비판. 아우슈비츠 이후 시와 철학이 무엇을 의미할 수 있는지 물었다."}, "es": {"name": "Adorno", "s": "Dialéctica negativa. Crítica de la industria cultural. Interrogó qué podían significar la poesía y la filosofía después de Auschwitz."}, "fr": {"name": "Adorno", "s": "Dialectique négative. Critique de l'industrie culturelle. Il interrogea ce que pouvaient signifier la poésie et la philosophie après Auschwitz."}, "pt": {"name": "Adorno", "s": "Dialética negativa. Crítica da indústria cultural. Interrogou o que a poesia e a filosofia poderiam significar depois de Auschwitz."}}, "marcuse": {"zh": {"name": "马尔库塞", "s": "《单向度的人》。综合马克思与弗洛伊德以批判被管控的社会。新左派的理论支柱。"}, "ko": {"name": "마르쿠제", "s": "『일차원적 인간』. 마르크스와 프로이트를 종합하여 관리 사회를 비판했다. 신좌파의 이론적 지주이다."}, "es": {"name": "Marcuse", "s": "El hombre unidimensional. Sintetizó a Marx y Freud para criticar la sociedad administrada. Pilar teórico de la Nueva Izquierda."}, "fr": {"name": "Marcuse", "s": "L'Homme unidimensionnel. Il synthétisa Marx et Freud pour critiquer la société administrée. Pilier théorique de la Nouvelle Gauche."}, "pt": {"name": "Marcuse", "s": "O Homem Unidimensional. Sintetizou Marx e Freud para criticar a sociedade administrada. Pilar teórico da Nova Esquerda."}}, "gadamer": {"zh": {"name": "伽达默尔", "s": "《真理与方法》。诠释学循环与「视域融合」作为一种理解的存在论。"}, "ko": {"name": "가다머", "s": "『진리와 방법』. 이해의 존재론으로서 해석학적 순환과 \"지평 융합\"을 전개했다."}, "es": {"name": "Gadamer", "s": "Verdad y método. El círculo hermenéutico y la \"fusión de horizontes\" como ontología de la comprensión."}, "fr": {"name": "Gadamer", "s": "Vérité et Méthode. Le cercle herméneutique et la « fusion des horizons » comme ontologie de la compréhension."}, "pt": {"name": "Gadamer", "s": "Verdade e Método. O círculo hermenêutico e a \"fusão de horizontes\" como uma ontologia da compreensão."}}, "ricoeur": {"zh": {"name": "利科", "s": "叙事同一性理论。架起诠释学与现象学的桥梁；并将二者延伸至文本理论与自我论。"}, "ko": {"name": "리쾨르", "s": "이야기 정체성 이론. 해석학과 현상학을 잇고, 이 둘을 텍스트 이론과 자아 개념으로 확장했다."}, "es": {"name": "Ricœur", "s": "Teoría de la identidad narrativa. Tendió un puente entre hermenéutica y fenomenología; las extendió a la teoría del texto y la mismidad."}, "fr": {"name": "Ricœur", "s": "Théorie de l'identité narrative. Il fit le pont entre l'herméneutique et la phénoménologie ; il les prolongea dans la théorie du texte et l'ipséité."}, "pt": {"name": "Ricoeur", "s": "Teoria da identidade narrativa. Aproximou a hermenêutica e a fenomenologia; estendeu ambas à teoria do texto e à questão do si-mesmo."}}, "habermas": {"zh": {"name": "哈贝马斯", "s": "交往行为理论。法兰克福学派第二代。公共领域与商谈民主的理论家。"}, "ko": {"name": "하버마스", "s": "의사소통 행위 이론. 프랑크푸르트 학파 2세대. 공공 영역과 숙의 민주주의의 이론가이다."}, "es": {"name": "Habermas", "s": "Teoría de la acción comunicativa. Segunda generación de la Escuela de Fráncfort. Teórico de la esfera pública y la democracia deliberativa."}, "fr": {"name": "Habermas", "s": "Théorie de l'agir communicationnel. Deuxième génération de l'École de Francfort. Théoricien de l'espace public et de la démocratie délibérative."}, "pt": {"name": "Habermas", "s": "Teoria da ação comunicativa. Segunda geração da Escola de Frankfurt. Teórico da esfera pública e da democracia deliberativa."}}, "saussure": {"zh": {"name": "索绪尔", "s": "《普通语言学教程》。将语言视为能指与所指之间差异的系统。结构主义之父。"}, "ko": {"name": "소쉬르", "s": "『일반언어학 강의』. 언어를 기표와 기의 사이의 차이의 체계로 보았다. 구조주의의 아버지이다."}, "es": {"name": "Saussure", "s": "Curso de lingüística general. La lengua como sistema de diferencias entre significante y significado. Padre del estructuralismo."}, "fr": {"name": "Saussure", "s": "Cours de linguistique générale. La langue comme système de différences entre signifiant et signifié. Père du structuralisme."}, "pt": {"name": "Saussure", "s": "Curso de Linguística Geral. A língua como um sistema de diferenças entre significante e significado. Pai do estruturalismo."}}, "levi_strauss": {"zh": {"name": "列维-斯特劳斯", "s": "《野性的思维》。通过分析神话与亲属关系确立了结构主义人类学。批判了萨特式的主体主义。"}, "ko": {"name": "레비스트로스", "s": "『야생의 사고』. 신화와 친족 구조를 분석하여 구조주의 인류학을 확립했다. 사르트르의 주체주의를 비판했다."}, "es": {"name": "Lévi-Strauss", "s": "El pensamiento salvaje. Estableció la antropología estructural analizando el mito y el parentesco. Criticó el subjetivismo sartreano."}, "fr": {"name": "Lévi-Strauss", "s": "La Pensée sauvage. Il établit l'anthropologie structurale en analysant le mythe et la parenté. Il critiqua le subjectivisme sartrien."}, "pt": {"name": "Lévi-Strauss", "s": "O Pensamento Selvagem. Estabeleceu a antropologia estrutural analisando o mito e o parentesco. Criticou o subjetivismo sartriano."}}, "lacan": {"zh": {"name": "拉康", "s": "「无意识如语言般被结构化。」镜像阶段理论。对弗洛伊德的结构主义式重读。"}, "ko": {"name": "라캉", "s": "\"무의식은 언어처럼 구조화되어 있다.\" 거울 단계 이론. 프로이트에 대한 구조주의적 재독해이다."}, "es": {"name": "Lacan", "s": "\"El inconsciente está estructurado como un lenguaje.\" Teoría del estadio del espejo. Una relectura estructural de Freud."}, "fr": {"name": "Lacan", "s": "« L'inconscient est structuré comme un langage. » Théorie du stade du miroir. Une relecture structuraliste de Freud."}, "pt": {"name": "Lacan", "s": "\"O inconsciente é estruturado como uma linguagem.\" Teoria do estágio do espelho. Uma releitura estrutural de Freud."}}, "barthes": {"zh": {"name": "巴特", "s": "「作者之死。」将符号学应用于文化、神话与文本。提出文本的愉悦理论。"}, "ko": {"name": "바르트", "s": "\"저자의 죽음.\" 기호학을 문화, 신화, 텍스트에 적용했다. 텍스트의 즐거움을 이론화했다."}, "es": {"name": "Barthes", "s": "\"La muerte del autor.\" Aplicó la semiótica a la cultura, el mito y los textos. Teorizó el placer del texto."}, "fr": {"name": "Barthes", "s": "« La mort de l'auteur. » Il appliqua la sémiotique à la culture, au mythe et aux textes. Il théorisa le plaisir du texte."}, "pt": {"name": "Barthes", "s": "\"A Morte do Autor.\" Aplicou a semiótica à cultura, ao mito e aos textos. Teorizou o prazer do texto."}}, "foucault": {"zh": {"name": "福柯", "s": "权力／知识、生命政治、规训社会。关于疯癫、监狱与性的谱系学揭示了现代主体是如何被建构的。"}, "ko": {"name": "푸코", "s": "권력/지식, 생명권력, 규율 사회. 광기, 감옥, 성의 계보학은 근대적 주체가 어떻게 구성되는지 드러낸다."}, "es": {"name": "Foucault", "s": "Poder/saber, biopoder, sociedad disciplinaria. Las genealogías de la locura, la prisión y la sexualidad revelan cómo se construye el sujeto moderno."}, "fr": {"name": "Foucault", "s": "Pouvoir/savoir, biopouvoir, société disciplinaire. Les généalogies de la folie, de la prison et de la sexualité révèlent comment le sujet moderne est construit."}, "pt": {"name": "Foucault", "s": "Poder/saber, biopoder, sociedade disciplinar. Genealogias da loucura, da prisão e da sexualidade revelam como o sujeito moderno é construído."}}, "deleuze": {"zh": {"name": "德勒兹", "s": "《差异与重复》。根茎、无器官的身体。《反俄狄浦斯》（与瓜塔里合著）。哲学即概念的创造。"}, "ko": {"name": "들뢰즈", "s": "『차이와 반복』. 리좀, 기관 없는 신체. (가타리와 함께) 『안티 오이디푸스』. 개념의 창조로서의 철학."}, "es": {"name": "Deleuze", "s": "Diferencia y repetición. Rizoma, cuerpo sin órganos. El Anti-Edipo (con Guattari). La filosofía como creación de conceptos."}, "fr": {"name": "Deleuze", "s": "Différence et Répétition. Rhizome, corps sans organes. L'Anti-Œdipe (avec Guattari). La philosophie comme création de concepts."}, "pt": {"name": "Deleuze", "s": "Diferença e Repetição. Rizoma, Corpo sem Órgãos. O Anti-Édipo (com Guattari). A filosofia como criação de conceitos."}}, "derrida": {"zh": {"name": "德里达", "s": "解构。质疑贯穿于整个西方哲学之下的语音中心主义与在场形而上学。"}, "ko": {"name": "데리다", "s": "해체. 서양 철학 전체의 바탕에 놓인 음성 중심주의와 현전의 형이상학에 문제를 제기했다."}, "es": {"name": "Derrida", "s": "Deconstrucción. Cuestionó el fonocentrismo y la metafísica de la presencia que subyacen a toda la filosofía occidental."}, "fr": {"name": "Derrida", "s": "La déconstruction. Il remit en question le phonocentrisme et la métaphysique de la présence qui sous-tendent toute la philosophie occidentale."}, "pt": {"name": "Derrida", "s": "Desconstrução. Questionou o fonocentrismo e a metafísica da presença que subjazem a toda a filosofia ocidental."}}, "kristeva": {"zh": {"name": "克里斯蒂娃", "s": "贱斥理论、互文性。横跨精神分析、符号学与女性主义，作出独创性的理论综合。"}, "ko": {"name": "크리스테바", "s": "아브젝시옹 이론, 상호텍스트성. 정신분석, 기호학, 페미니즘을 가로지르며 독창적인 이론적 종합을 이루었다."}, "es": {"name": "Kristeva", "s": "Teoría de la abyección, intertextualidad. Recorrió el psicoanálisis, la semiótica y el feminismo en una síntesis teórica original."}, "fr": {"name": "Kristeva", "s": "Théorie de l'abjection, intertextualité. Elle traversa la psychanalyse, la sémiotique et le féminisme en une synthèse théorique originale."}, "pt": {"name": "Kristeva", "s": "Teoria da abjeção, intertextualidade. Atravessou a psicanálise, a semiótica e o feminismo em uma síntese teórica original."}}, "frege": {"zh": {"name": "弗雷格", "s": "现代逻辑学的创始人。含义／指称之区分。整个分析哲学传统的深层源头。"}, "ko": {"name": "프레게", "s": "근대 논리학의 창시자. 뜻과 지시체의 구분. 분석철학 전통 전체의 깊은 원천이다."}, "es": {"name": "Frege", "s": "Fundador de la lógica moderna. Distinción entre sentido y referencia. La fuente profunda de toda la tradición de la filosofía analítica."}, "fr": {"name": "Frege", "s": "Fondateur de la logique moderne. Distinction sens/référence. La source profonde de toute la tradition de la philosophie analytique."}, "pt": {"name": "Frege", "s": "Fundador da lógica moderna. Distinção entre sentido e referência. A fonte profunda de toda a tradição da filosofia analítica."}}, "russell": {"zh": {"name": "罗素", "s": "逻辑原子主义。合著《数学原理》。维特根斯坦的导师，分析哲学的共同奠基者。"}, "ko": {"name": "러셀", "s": "논리적 원자론. 『수학 원리』를 공동 저술했다. 비트겐슈타인의 스승이자 분석철학의 공동 창시자이다."}, "es": {"name": "Russell", "s": "Atomismo lógico. Coautor de los Principia Mathematica. Maestro de Wittgenstein y cofundador de la filosofía analítica."}, "fr": {"name": "Russell", "s": "Atomisme logique. Coauteur des Principia Mathematica. Maître de Wittgenstein et cofondateur de la philosophie analytique."}, "pt": {"name": "Russell", "s": "Atomismo lógico. Coautor do Principia Mathematica. Mentor de Wittgenstein e cofundador da filosofia analítica."}}, "moore": {"zh": {"name": "G.E. 摩尔", "s": "常识哲学；在伦理学中指出了自然主义谬误。共同引领了剑桥的分析哲学革命。"}, "ko": {"name": "G.E. 무어", "s": "상식 철학. 윤리학에서 자연주의적 오류를 지적했다. 케임브리지에서 분석 철학 혁명을 함께 이끌었다."}, "es": {"name": "G. E. Moore", "s": "Filosofía del sentido común; identificó la falacia naturalista en la ética. Colideró la revolución analítica en Cambridge."}, "fr": {"name": "G. E. Moore", "s": "Philosophie du sens commun ; il identifia le sophisme naturaliste en éthique. Il codirigea la révolution analytique à Cambridge."}, "pt": {"name": "G.E. Moore", "s": "Filosofia do senso comum; identificou a falácia naturalista na ética. Coliderou a revolução analítica em Cambridge."}}, "wittgenstein": {"zh": {"name": "维特根斯坦", "s": "从《逻辑哲学论》到《哲学研究》。语言游戏理论。两度为分析哲学指明方向的奇才。"}, "ko": {"name": "비트겐슈타인", "s": "『논리철학논고』에서 『철학적 탐구』로. 언어 게임 이론. 분석철학의 방향을 두 번 바꾼 인물이다."}, "es": {"name": "Wittgenstein", "s": "Del Tractatus a las Investigaciones filosóficas. Teoría de los juegos de lenguaje. Reorientó la filosofía analítica dos veces."}, "fr": {"name": "Wittgenstein", "s": "Du Tractatus aux Recherches philosophiques. Théorie des jeux de langage. Il réorienta deux fois la philosophie analytique."}, "pt": {"name": "Wittgenstein", "s": "Do Tractatus às Investigações Filosóficas. Teoria dos jogos de linguagem. Redirecionou a filosofia analítica duas vezes."}}, "carnap": {"zh": {"name": "卡尔纳普", "s": "逻辑实证主义（维也纳学派）的核心人物。可证实性原理将形而上学命题斥为无意义。"}, "ko": {"name": "카르나프", "s": "논리실증주의(빈학파)의 중심 인물. 검증 가능성 원리로 형이상학적 주장을 무의미한 것으로 배격했다."}, "es": {"name": "Carnap", "s": "Figura central del positivismo lógico (Círculo de Viena). El principio de verificabilidad descartó las afirmaciones metafísicas como carentes de sentido."}, "fr": {"name": "Carnap", "s": "Figure centrale du positivisme logique (Cercle de Vienne). Le principe de vérifiabilité rejeta les énoncés métaphysiques comme dénués de sens."}, "pt": {"name": "Carnap", "s": "Figura central do positivismo lógico (Círculo de Viena). O princípio da verificabilidade descartou as afirmações metafísicas como destituídas de sentido."}}, "popper": {"zh": {"name": "波普尔", "s": "以可证伪性作为科学的判准。《开放社会及其敌人》批判了极权主义与历史主义。"}, "ko": {"name": "포퍼", "s": "반증 가능성을 과학의 기준으로 삼았다. 『열린 사회와 그 적들』은 전체주의와 역사주의를 비판했다."}, "es": {"name": "Popper", "s": "La falsabilidad como criterio de la ciencia. La sociedad abierta y sus enemigos criticó el totalitarismo y el historicismo."}, "fr": {"name": "Popper", "s": "La falsifiabilité comme critère de la science. La Société ouverte et ses ennemis critiqua le totalitarisme et l'historicisme."}, "pt": {"name": "Popper", "s": "A falseabilidade como critério da ciência. A Sociedade Aberta e seus Inimigos criticou o totalitarismo e o historicismo."}}, "quine": {"zh": {"name": "奎因", "s": "《经验主义的两个教条》瓦解了分析／综合的区分。发展出本体论相对性。"}, "ko": {"name": "콰인", "s": "\"경험주의의 두 도그마\"로 분석/종합 구분을 해체했다. 존재론적 상대성을 전개했다."}, "es": {"name": "Quine", "s": "\"Dos dogmas del empirismo\" desmanteló la distinción analítico/sintético. Desarrolló la relatividad ontológica."}, "fr": {"name": "Quine", "s": "« Les deux dogmes de l'empirisme » démantela la distinction analytique/synthétique. Il développa la relativité ontologique."}, "pt": {"name": "Quine", "s": "\"Dois Dogmas do Empirismo\" desmontou a distinção analítico/sintético. Desenvolveu a relatividade ontológica."}}, "rawls": {"zh": {"name": "罗尔斯", "s": "《正义论》。「无知之幕」思想实验为「作为公平的正义」奠基。20世纪占主导地位的政治哲学。"}, "ko": {"name": "롤스", "s": "『정의론』. \"무지의 베일\" 사고 실험으로 공정으로서의 정의를 정초했다. 20세기 정치철학을 지배했다."}, "es": {"name": "Rawls", "s": "Teoría de la justicia. El experimento mental del \"velo de la ignorancia\" fundamenta la justicia como equidad. La filosofía política dominante del siglo XX."}, "fr": {"name": "Rawls", "s": "Théorie de la justice. L'expérience de pensée du « voile d'ignorance » fonde la justice comme équité. Philosophie politique dominante du XXe siècle."}, "pt": {"name": "Rawls", "s": "Uma Teoria da Justiça. O experimento mental do \"véu da ignorância\" fundamenta a justiça como equidade. Filosofia política dominante do século XX."}}, "nozick": {"zh": {"name": "诺齐克", "s": "《无政府、国家与乌托邦》向罗尔斯发起挑战，捍卫最小国家论。自由至上主义的理论支柱。"}, "ko": {"name": "노직", "s": "『아나키에서 유토피아로』는 롤스에 반박하며 최소 국가를 옹호했다. 자유지상주의의 이론적 닻이다."}, "es": {"name": "Nozick", "s": "Anarquía, Estado y utopía desafió a Rawls para defender el Estado mínimo. Anclaje teórico del libertarismo."}, "fr": {"name": "Nozick", "s": "Anarchie, État et utopie répondit à Rawls en défendant l'État minimal. Ancrage théorique du libertarianisme."}, "pt": {"name": "Nozick", "s": "Anarquia, Estado e Utopia contestou Rawls para defender o Estado mínimo. Âncora teórica do libertarianismo."}}, "uexkull": {"zh": {"name": "冯·魏克斯库尔", "s": "发展出环境界（Umwelt）理论：每种动物都栖居于其物种特有的感知世界。影响了海德格尔对动物生命的分析。"}, "ko": {"name": "윅스퀼", "s": "환세계(Umwelt) 이론을 발전시켰다. 각 동물은 종 고유의 지각 세계에 산다는 것이다. 하이데거의 동물 분석에 영향을 주었다."}, "es": {"name": "Jakob von Uexküll", "s": "Desarrolló la teoría del Umwelt: cada animal habita un mundo perceptivo propio de su especie. Influyó en el análisis heideggeriano de la vida animal."}, "fr": {"name": "von Uexküll", "s": "Il développa la théorie de l'Umwelt : chaque animal habite un monde perceptif propre à son espèce. Il influença l'analyse heideggérienne de la vie animale."}, "pt": {"name": "von Uexküll", "s": "Desenvolveu a teoria do Umwelt: cada animal habita um mundo perceptivo específico de sua espécie. Influenciou a análise da vida animal de Heidegger."}}, "jonas": {"zh": {"name": "汉斯·约纳斯", "s": "海德格尔的学生、阿伦特的挚友。其生命哲学将有机体视为自我维持的代谢过程；直接影响了自创生理论。"}, "ko": {"name": "한스 요나스", "s": "하이데거의 제자이자 아렌트의 벗. 유기체를 자기 유지적 대사 과정으로 본 생명의 철학은 오토포이에시스 이론에 직접 영향을 주었다."}, "es": {"name": "Hans Jonas", "s": "Discípulo de Heidegger y amigo de Arendt. Su filosofía de la vida trató a los organismos como procesos metabólicos autosostenidos; influyó directamente en la teoría de la autopoiesis."}, "fr": {"name": "Hans Jonas", "s": "Élève de Heidegger et ami d'Arendt. Sa philosophie de la vie considère les organismes comme des processus métaboliques autonomes ; elle influença directement la théorie de l'autopoïèse."}, "pt": {"name": "Hans Jonas", "s": "Aluno de Heidegger e amigo de Arendt. Sua filosofia da vida tratou os organismos como processos metabólicos autossustentáveis; influenciou diretamente a teoria da autopoiese."}}, "maturana": {"zh": {"name": "马图拉纳", "s": "智利生物学家。与瓦雷拉共同提出「自创生」（自我组织、自我产出的生命系统）作为一种生命理论。"}, "ko": {"name": "마투라나", "s": "칠레의 생물학자. 바렐라와 함께 생명 이론으로서 오토포이에시스(자기 조직화·자기 생산 생명 시스템)를 발전시켰다."}, "es": {"name": "Maturana", "s": "Biólogo chileno. Codesarrolló la autopoiesis (sistemas vivos autoorganizados y autoproductivos) junto a Varela como teoría de la vida."}, "fr": {"name": "Maturana", "s": "Biologiste chilien. Il développa avec Varela l'autopoïèse (systèmes vivants auto-organisés et auto-producteurs) comme théorie de la vie."}, "pt": {"name": "Maturana", "s": "Biólogo chileno. Codesenvolveu com Varela a autopoiese (sistemas vivos auto-organizadores e autoprodutores) como teoria da vida."}}, "varela": {"zh": {"name": "瓦雷拉", "s": "以自创生为基础，发展出生成认知论（具身心智）与神经现象学，将胡塞尔与梅洛-庞蒂接入认知科学。"}, "ko": {"name": "바렐라", "s": "오토포이에시스를 토대로 행위주의(체화된 마음)와 신경현상학을 전개하여 후설·메를로퐁티를 인지과학에 연결했다."}, "es": {"name": "Varela", "s": "Partiendo de la autopoiesis, desarrolló el enactivismo (mente encarnada) y la neurofenomenología, vinculando a Husserl y Merleau-Ponty con la ciencia cognitiva."}, "fr": {"name": "Varela", "s": "S'appuyant sur l'autopoïèse, il développa l'énactivisme (l'esprit incarné) et la neurophénoménologie, reliant Husserl et Merleau-Ponty aux sciences cognitives."}, "pt": {"name": "Varela", "s": "Baseando-se na autopoiese, desenvolveu o enativismo (mente incorporada) e a neurofenomenologia, ligando Husserl e Merleau-Ponty à ciência cognitiva."}}, "luhmann": {"zh": {"name": "卢曼", "s": "将自创生概念应用于社会系统理论：社会通过沟通而非个体来自我产出。以与哈贝马斯的论战而闻名。"}, "ko": {"name": "루만", "s": "오토포이에시스를 사회 시스템에 적용했다. 사회는 개인이 아닌 소통을 통해 자기 생산한다. 합리성을 두고 하버마스와 논쟁했다."}, "es": {"name": "Luhmann", "s": "Aplicó la autopoiesis a los sistemas sociales: la sociedad se autoproduce mediante la comunicación, no los individuos. Debatió con Habermas sobre la racionalidad."}, "fr": {"name": "Luhmann", "s": "Il appliqua l'autopoïèse aux systèmes sociaux : la société se produit elle-même par la communication, non par les individus. Célèbre pour son débat avec Habermas sur la rationalité."}, "pt": {"name": "Luhmann", "s": "Aplicou a autopoiese aos sistemas sociais: a sociedade se autoproduz por meio da comunicação, não dos indivíduos. Debateu com Habermas sobre racionalidade."}}};
const ERA_I18N={"ancient": {"zh": "古希腊", "ko": "고대 그리스", "es": "Grecia antigua", "fr": "Grèce antique", "pt": "Grécia Antiga"}, "medieval": {"zh": "中世纪", "ko": "중세", "es": "Medieval", "fr": "Moyen Âge", "pt": "Medieval"}, "rationalism_empiricism": {"zh": "近代早期：理性主义与经验主义", "ko": "근세: 합리론과 경험론", "es": "Modernidad temprana: racionalismo y empirismo", "fr": "Époque moderne : rationalisme et empirisme", "pt": "Início da Modernidade: Racionalismo e Empirismo"}, "idealism": {"zh": "德国观念论", "ko": "독일 관념론", "es": "Idealismo alemán", "fr": "Idéalisme allemand", "pt": "Idealismo Alemão"}, "19c_rebels": {"zh": "19世纪的反叛者", "ko": "19세기의 반역자들", "es": "Rebeldes del siglo XIX", "fr": "Rebelles du XIXe siècle", "pt": "Rebeldes do Século XIX"}, "psychoanalysis": {"zh": "精神分析", "ko": "정신분석", "es": "Psicoanálisis", "fr": "Psychanalyse", "pt": "Psicanálise"}, "pragmatism": {"zh": "实用主义", "ko": "실용주의", "es": "Pragmatismo", "fr": "Pragmatisme", "pt": "Pragmatismo"}, "phenomenology": {"zh": "现象学与存在主义", "ko": "현상학과 실존주의", "es": "Fenomenología y existencialismo", "fr": "Phénoménologie et existentialisme", "pt": "Fenomenologia e Existencialismo"}, "frankfurt": {"zh": "法兰克福学派与诠释学", "ko": "프랑크푸르트 학파와 해석학", "es": "Escuela de Fráncfort y hermenéutica", "fr": "École de Francfort et herméneutique", "pt": "Escola de Frankfurt e Hermenêutica"}, "poststructuralism": {"zh": "结构主义与后结构主义", "ko": "구조주의와 후기구조주의", "es": "Estructuralismo y postestructuralismo", "fr": "Structuralisme et post-structuralisme", "pt": "Estruturalismo e Pós-estruturalismo"}, "analytic": {"zh": "分析哲学与政治哲学", "ko": "분석철학과 정치철학", "es": "Filosofía analítica y política", "fr": "Philosophie analytique et politique", "pt": "Filosofia Analítica e Política"}, "cognitive_science": {"zh": "认知科学与系统论", "ko": "인지과학과 시스템 이론", "es": "Ciencia cognitiva y teoría de sistemas", "fr": "Sciences cognitives et théorie des systèmes", "pt": "Ciência Cognitiva e Teoria dos Sistemas"}};
const UI_I18N={"zh": {"title": "哲学家关系网络图", "stats": "{n} 位哲学家 / {e} 条关联", "searchPh": "搜索哲学家…", "legTitle": "时代筛选（点击切换）", "hint": "实线＝师承关系  点线＝影响  红色虚线＝批判性交锋\n节点大小＝关联数量\n缩放：滚动 / ± 键 / 按钮   重置：0", "reset": "重置", "relTitle": "关联（{n}）", "rt": {"teacher_out": "老师", "teacher_in": "学生", "critique": "批判性交锋", "inf_out": "→影响了", "inf_in": "受其影响"}}, "ko": {"title": "철학자 네트워크 지도", "stats": "철학자 {n}명 / 관계선 {e}개", "searchPh": "철학자 검색…", "legTitle": "시대 구분 (클릭하여 필터)", "hint": "실선=사제  점선=영향  붉은 파선=비판적 대결\n노드 크기 = 관계의 수\n확대/축소: 스크롤 / ± 키 / 버튼   초기화: 0", "reset": "초기화", "relTitle": "관계 ({n})", "rt": {"teacher_out": "스승", "teacher_in": "제자", "critique": "비판적 대결", "inf_out": "→영향을 줌", "inf_in": "영향을 받음"}}, "es": {"title": "Mapa de la red de filósofos", "stats": "{n} filósofos / {e} conexiones", "searchPh": "Buscar filósofos…", "legTitle": "Filtro por época (haz clic para alternar)", "hint": "Sólida=Maestro/Discípulo  Punteada=Influencia  Discontinua roja=Confrontación crítica\nTamaño del nodo = número de conexiones\nZoom: Rueda / Teclas ± / Botones   Restablecer: 0", "reset": "Restablecer", "relTitle": "Relaciones ({n})", "rt": {"teacher_out": "Maestro", "teacher_in": "Discípulo", "critique": "Confrontación crítica", "inf_out": "Influyó en →", "inf_in": "Influido por"}}, "fr": {"title": "Carte du réseau des philosophes", "stats": "{n} philosophes / {e} connexions", "searchPh": "Rechercher des philosophes…", "legTitle": "Filtre par époque (cliquer pour activer/désactiver)", "hint": "Plein=Maître/Élève  Pointillé=Influence  Tirets rouges=Débat critique\nTaille du nœud = nombre de connexions\nZoom : Molette / touches ± / Boutons   Réinitialiser : 0", "reset": "Réinitialiser", "relTitle": "Relations ({n})", "rt": {"teacher_out": "Maître", "teacher_in": "Élève", "critique": "Débat critique", "inf_out": "→A influencé", "inf_in": "Influencé par"}}, "pt": {"title": "Mapa da Rede de Filósofos", "stats": "{n} filósofos / {e} conexões", "searchPh": "Buscar filósofos…", "legTitle": "Filtro de Época (clique para alternar)", "hint": "Sólida=Mestre/Discípulo  Pontilhada=Influência  Tracejada Vermelha=Confronto Crítico\nTamanho do nó = número de conexões\nZoom: Rolar / teclas ± / Botões   Redefinir: 0", "reset": "Redefinir", "relTitle": "Relações ({n})", "rt": {"teacher_out": "Mestre", "teacher_in": "Discípulo", "critique": "Confronto Crítico", "inf_out": "→Influenciou", "inf_in": "Influenciado por"}}};
Object.keys(UI_I18N).forEach(function(code){var u=UI_I18N[code];S[code]={title:u.title,stats:function(n,e){return u.stats.replace('{n}',n).replace('{e}',e);},searchPh:u.searchPh,legTitle:u.legTitle,hint:u.hint,reset:u.reset,relTitle:function(n){return u.relTitle.replace('{n}',n);},rt:u.rt};});
const LANGS=[{code:'en',label:'English'},{code:'ja',label:'日本語'},{code:'zh',label:'中文'},{code:'ko',label:'한국어'},{code:'es',label:'Español'},{code:'fr',label:'Français'},{code:'pt',label:'Português'}];
function nodeName(n){if(lang==='ja')return n.name;if(lang==='en')return n.en;return (I18N[n.id]&&I18N[n.id][lang]&&I18N[n.id][lang].name)||n.en;}
function nodeSummary(n){if(lang==='ja')return n.ja;if(lang==='en')return n.summary_en||n.ja;return (I18N[n.id]&&I18N[n.id][lang]&&I18N[n.id][lang].s)||n.summary_en||n.ja;}
function eraLabel(era){if(lang==='ja')return era.ja;if(lang==='en')return era.en;return (ERA_I18N[era.id]&&ERA_I18N[era.id][lang])||era.en;}

// ───────────────────────────────────────────────
//  STATE
// ───────────────────────────────────────────────
let lang='en';
let selectedId=null, hoveredId=null, searchQ='';
let legendOpen = window.innerWidth>640;
const enabledEras=new Set(ERAS.map(e=>e.id));

// ───────────────────────────────────────────────
//  D3
// ───────────────────────────────────────────────
const svgEl=document.getElementById('graph');
const svg=d3.select(svgEl);
const W=()=>window.innerWidth, H=()=>window.innerHeight;

const defs=svg.append('defs');
const filt=defs.append('filter').attr('id','glow');
filt.append('feGaussianBlur').attr('stdDeviation','2.2').attr('result','blur');
const fm=filt.append('feMerge');
fm.append('feMergeNode').attr('in','blur');
fm.append('feMergeNode').attr('in','SourceGraphic');

const g=svg.append('g');

const zoom=d3.zoom().scaleExtent([0.2,4]).on('zoom',ev=>{
  g.attr('transform',ev.transform);
  document.getElementById('zoom-pct').textContent=Math.round(ev.transform.k*100)+'%';
});
svg.call(zoom).on('click',()=>selectNode(null));

// Mac trackpad + mobile: prevent default to give D3 full control
svgEl.addEventListener('wheel',     e=>e.preventDefault(),{passive:false});
svgEl.addEventListener('touchmove', e=>e.preventDefault(),{passive:false});

const nodes=NODES.map(n=>({...n}));
const links=EDGES.map(e=>({...e}));

const sim=d3.forceSimulation(nodes)
  .force('link',d3.forceLink(links).id(d=>d.id).distance(d=>d.type==='teacher'?60:95).strength(0.45))
  .force('charge',d3.forceManyBody().strength(-200))
  .force('center',d3.forceCenter(W()/2,H()/2))
  .force('collision',d3.forceCollide().radius(d=>8+(degree[d.id]||0)*1.2+22));

const linkSel=g.append('g').selectAll('line').data(links).join('line')
  .attr('stroke',d=>d.type==='critique'?'#E0594A':'#E8E2D0')
  .attr('stroke-width',d=>d.type==='teacher'?1.6:1)
  .attr('stroke-dasharray',d=>d.type==='influence'?'1,4':d.type==='critique'?'4,3':null)
  .attr('opacity',0.22);

const nodeSel=g.append('g').selectAll('g').data(nodes).join('g')
  .style('cursor','pointer')
  .call(d3.drag()
    .on('start',(ev,d)=>{if(!ev.active)sim.alphaTarget(0.25).restart();d.fx=d.x;d.fy=d.y;})
    .on('drag',(ev,d)=>{d.fx=ev.x;d.fy=ev.y;})
    .on('end',(ev,d)=>{if(!ev.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}))
  .on('click',(ev,d)=>{ev.stopPropagation();selectNode(d.id);})
  .on('mouseenter',(ev,d)=>{hoveredId=d.id;updateOpacity();})
  .on('mouseleave',()=>{hoveredId=null;updateOpacity();});

nodeSel.append('circle')
  .attr('r',d=>5+(degree[d.id]||0)*1.15)
  .attr('fill',d=>eraMap[d.era]?.color||'#E8E2D0')
  .attr('stroke','#0A0D14').attr('stroke-width',1.4)
  .attr('filter','url(#glow)');

const nodeLabelSel=nodeSel.append('text')
  .attr('x',d=>7+(degree[d.id]||0)*1.15).attr('y',4)
  .attr('class','node-label')
  .text(d=>d.name);

function render(){
  linkSel.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
         .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  nodeSel.attr('transform',d=>'translate('+d.x+','+d.y+')');
}
sim.on('tick',render);

// Fit the whole graph (nodes + labels) into the viewport, edge to edge.
function fitToView(pad,dur){
  if(!nodes.length)return;
  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  nodes.forEach(d=>{
    const r=5+(degree[d.id]||0)*1.15;
    const lblW=(7+(degree[d.id]||0)*1.15)+(nodeName(d)||'').length*6.6;
    if(d.x-r<minX)minX=d.x-r;
    if(d.x+lblW>maxX)maxX=d.x+lblW;
    if(d.y-r<minY)minY=d.y-r;
    if(d.y+r>maxY)maxY=d.y+r;
  });
  const gw=maxX-minX,gh=maxY-minY;
  if(gw<=0||gh<=0)return;
  const scale=Math.max(0.2,Math.min((W()-pad*2)/gw,(H()-pad*2)/gh,4));
  const tx=W()/2-scale*(minX+maxX)/2;
  const ty=H()/2-scale*(minY+maxY)/2;
  const t=d3.zoomIdentity.translate(tx,ty).scale(scale);
  (dur?svg.transition().duration(dur):svg).call(zoom.transform,t);
}

// ───────────────────────────────────────────────
//  FUNCTIONS
// ───────────────────────────────────────────────
function selectNode(id){selectedId=id;updateOpacity();updateDetail();}

function updateOpacity(){
  const fid=selectedId||hoveredId;
  const nb=fid?neighborMap[fid]:null;
  const q=searchQ.toLowerCase();
  nodeSel.style('opacity',d=>{
    if(!enabledEras.has(d.era))return 0.04;
    if(q&&!(d.name.toLowerCase().includes(q)||d.en.toLowerCase().includes(q)||nodeName(d).toLowerCase().includes(q)))return 0.12;
    if(fid)return d.id===fid||nb?.has(d.id)?1:0.12;
    return 1;
  });
  linkSel.style('opacity',d=>{
    const s=d.source.id||d.source,t=d.target.id||d.target;
    if(!enabledEras.has(d.source.era)||!enabledEras.has(d.target.era))return 0.02;
    if(fid)return s===fid||t===fid?0.9:0.04;
    return 0.22;
  });
}

function updateDetail(){
  const panel=document.getElementById('detail');
  if(!selectedId){panel.classList.remove('open');return;}
  const n=nodeMap[selectedId],era=eraMap[n.era];
  const s=S[lang];
  document.getElementById('d-era').textContent=era?eraLabel(era):'';
  document.getElementById('d-era').style.color=era?.color||'#EDE7D6';
  const localName=nodeName(n);
  document.getElementById('d-name').textContent=localName;
  document.getElementById('d-meta').textContent=localName===n.en?n.en+' · '+n.life:localName+' ('+n.en+') · '+n.life;
  document.getElementById('d-summary').textContent=nodeSummary(n);
  const conns=EDGES.filter(e=>e.source===selectedId||e.target===selectedId);
  document.getElementById('d-rel-title').textContent=s.relTitle(conns.length);
  const relsEl=document.getElementById('d-rels');
  relsEl.innerHTML='';
  conns.forEach(e=>{
    const otherId=e.source===selectedId?e.target:e.source;
    const dir=e.source===selectedId?'out':'in';
    const other=nodeMap[otherId];if(!other)return;
    const tc=e.type==='critique'?'#E0594A':e.type==='teacher'?'#A7AC4E':'#82A6C9';
    let tl;
    if(e.type==='teacher')tl=dir==='out'?s.rt.teacher_out:s.rt.teacher_in;
    else if(e.type==='critique')tl=s.rt.critique;
    else tl=dir==='out'?s.rt.inf_out:s.rt.inf_in;
    const btn=document.createElement('button');
    btn.className='rel-row';
    btn.innerHTML='<span class="rel-name">'+nodeName(other)+'</span><span class="rel-type" style="color:'+tc+'">'+tl+'</span>';
    btn.addEventListener('click',()=>selectNode(otherId));
    relsEl.appendChild(btn);
  });
  panel.classList.add('open');
}

function buildLegend(){
  const list=document.getElementById('era-list');
  list.innerHTML='';
  ERAS.forEach(era=>{
    const btn=document.createElement('button');
    btn.className='era-btn';
    btn.style.opacity=enabledEras.has(era.id)?'1':'0.3';
    btn.innerHTML='<span class="era-dot" style="background:'+era.color+'"></span><span class="era-lbl">'+eraLabel(era)+'</span>';
    btn.addEventListener('click',()=>{
      enabledEras.has(era.id)?enabledEras.delete(era.id):enabledEras.add(era.id);
      btn.style.opacity=enabledEras.has(era.id)?'1':'0.3';
      updateOpacity();
    });
    list.appendChild(btn);
  });
  document.getElementById('era-list').style.display=legendOpen?'flex':'none';
  document.getElementById('leg-hint').style.display=legendOpen?'block':'none';
}

function applyStrings(){
  const s=S[lang];
  document.getElementById('t-title').textContent=s.title;
  document.getElementById('t-stats').textContent=s.stats(NODES.length,EDGES.length);
  document.getElementById('search-input').placeholder=s.searchPh;
  document.getElementById('t-leg-title').textContent=s.legTitle;
  document.getElementById('t-leg-hint').textContent=s.hint;
  document.getElementById('t-reset').textContent=s.reset;
  document.getElementById('lang-select').value=lang;
  document.documentElement.lang=lang;
  nodeLabelSel.text(d=>nodeName(d));
  buildLegend();
  if(selectedId)updateDetail();
}

function doReset(){
  fitToView(70,500);
  selectNode(null);
  searchQ='';
  document.getElementById('search-input').value='';
  document.getElementById('clear-btn').style.display='none';
}

// ───────────────────────────────────────────────
//  EVENT LISTENERS
// ───────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input',e=>{
  searchQ=e.target.value.trim();
  document.getElementById('clear-btn').style.display=searchQ?'block':'none';
  updateOpacity();
});
document.getElementById('clear-btn').addEventListener('click',()=>{
  searchQ='';document.getElementById('search-input').value='';
  document.getElementById('clear-btn').style.display='none';updateOpacity();
});
document.getElementById('d-close').addEventListener('click',()=>selectNode(null));
document.getElementById('btn-zi').addEventListener('click',()=>svg.transition().duration(220).call(zoom.scaleBy,1.5));
document.getElementById('btn-zo').addEventListener('click',()=>svg.transition().duration(220).call(zoom.scaleBy,1/1.5));
document.getElementById('reset-btn').addEventListener('click',doReset);
document.getElementById('leg-toggle').addEventListener('click',()=>{
  legendOpen=!legendOpen;
  document.getElementById('era-list').style.display=legendOpen?'flex':'none';
  document.getElementById('leg-hint').style.display=legendOpen?'block':'none';
});
document.getElementById('lang-select').addEventListener('change',e=>{
  lang=e.target.value;
  applyStrings();
});

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.key==='+'||e.key==='='||e.key==='ArrowUp'){e.preventDefault();svg.transition().duration(220).call(zoom.scaleBy,1.5);}
  if(e.key==='-'||e.key==='ArrowDown'){e.preventDefault();svg.transition().duration(220).call(zoom.scaleBy,1/1.5);}
  if(e.key==='0')doReset();
  if(e.key==='Escape')selectNode(null);
});

window.addEventListener('resize',()=>{
  fitToView(70,0);
});

// ── Init ────────────────────────────────────────
// Settle the force layout synchronously, then fit the whole map into view.
sim.alpha(1);
for(let i=0;i<400;i++)sim.tick();
sim.stop();
render();
applyStrings();
fitToView(70,0);
</script>
</body>
</html>
